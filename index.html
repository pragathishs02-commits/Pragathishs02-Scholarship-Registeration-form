<!DOCTYPE html>
<html> 
    <head> 
        <meta name="google-site-verification" content="JjiKfJb50AmOKBBAoqdqTGvFzgWHUjpj2ZHYrICx2eI" />
        <link rel="stylesheet" href="style.css"> 
        <link rel="icon" href="Screenshot 2026-07-04 162329.png" type="image/png">
        <title> Scholarship Form </title>
    </head>
    <body>
        <h1>Fill the form </h1>
        <form>
            <label>Name:</label>
            <input type="text" placeholder="Enter your name" required><br><br>
            <label>Email:</label>
            <input type="email" placeholder="Enter your email" required><br><br>
            <label>Password:</label>
            <input type="password" placeholder="Enter your password" required><br><br>
            <label>Gender:</label>
            <input type="radio" name="gender" value="Male" >Male
            <input type="radio" name="gender" value="Female">Female <br><br>
            <label>Date of birth:</label>
            <input type="date" required> <br><br>
             <label>School Name:</label>
            <input type="text" placeholder="Enter your school name"><br><br>
            <label>Phone Number 1:</label>
            <input type="tel" required pattern="[0-9]{10}" placeholder="Enter your Phone Number "><br><br>
            <label>Phone Number 2:</label>
            <input type="tel" required pattern="[0-9]{10}" placeholder="Enter your Phone Number "><br><br>
            <label>Annual income:</label>
            <select required>
                <option value="" selected disabled>Select Annual Income</option>
                <option>100000</option>
                <option>200000</option>
                <option>300000</option>
                <option>400000</option>
                <option>500000</option>
            </select><br><br>
            <label>Address:</label><br>
            <textarea rows="4" cols="40"></textarea><br><br>
            <label>Country:</label>
            <select required>
                    <option value="" selected disabled>Select your country</option>
                    <option>India</option>
                    <option>USA</option>
                    <option>Canada</option>
                    <option>Australia</option>
                    <option>Sri Lanka</option>
                    <option>Japan</option>
                    <option>Afghanistan</option>
                    <option>Bangladesh</option>
                    <option>Pakistan</option>
                    <option>West Indies</option>
                    <option>France</option>
                    <option>Brazil</option>
                    <option>Germany</option>
                    <option>Italy</option>
                    <option>Indonesia</option>
                    <option>Argentina</option>
                    <option>China</option>
                    <option>South Africa</option>
                    <option>Russia</option>
                    <option>Egypt</option>
                   </select> <br><br>
                   <hr>
        <h2>UPLOAD THE CERTIFICATES FOR VERIFICATION</h2><br><br>
        <label>10th Marksheet:</label>
        <input type="file" accept=".pdf,.jpg,.jpeg,.png" required><br><br>
        <label>Select the 10th passed year:</label>
        <select required>
            <option value="" selected disabled>Select the year</option>
            <option>2026</option>
            <option>2025</option>
            <option>2024</option>
        </select><br><br>
        <label>11th Marksheet:</label> 
        <input type="file" accept=".pdf,.jpg,.jpeg,.png" required><br><br>  
        <label>Select the 11th passed year:</label>
        <select required>
            <option value="" selected disabled>Select the  year</option>
            <option>2026</option>
            <option>2025</option>
            <option>2024</option>
        </select><br><br>
        <label>12th Marksheet:</label> 
        <input type="file" accept=".pdf,.jpg,.jpeg,.png" required><br><br>
        <label>Select the 12th passed year:</label>
        <select required>
            <option value="" selected disabled>Select the  year</option>
            <option>2026</option>
            <option>2025</option>
            <option>2024</option>
        </select><br><br>
        <label>Community Certificate:</label> 
        <input type="file" accept=".pdf,.jpg,.jpeg,.png" required><br><br>
        <label>Select your Community:</label>
        <select required>
            <option value="" selected disabled>Select Community:</option>
            <option>BC</option>
            <option>MBC</option>
            <option>SC</option>
            <option>SCA</option>
            <option>ST</option>
        </select> <br><br>
        <label>Aadhar Card:</label> 
        <input type="file" accept=".pdf,.jpg" required> <br><br>
        <label>Bank Passbook of student or parents:</label>  
        <input type="file" accept=".pdf,.jpg" required> <br><br>    
        <label>Tell the reason for the requirement of scholarship:</label><br>
        <textarea rows="15" cols="45" required></textarea><br><br>
        <input type="checkbox" required>
        <label>
        I hereby declare that the information provided above is true and correct. If any information is found to be false, my application may be cancelled.
        </label><br><br>
        <input type="submit" value="Submit"><br><br>
        <input type="reset" value="Reset" >

    </form>
    </body>
</html>
